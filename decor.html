<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Decoruri | VIP Events Solutions</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#0d0d0d;
  color:#fff;
}

.hero{
  height:40vh;
  background:url("images/banner-decor.jpeg") center/contain no-repeat;
  background-color:#000;
}

.nav{
  text-align:center;
  padding:25px;
}

.nav a{
  display:inline-block;
  margin:8px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:#fff;
  background:#1a1a1a;
  border:1px solid #333;
}

section{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.img-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.img-grid img{
  width:100%;
  height:230px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

.desc{
  text-align:center;
  color:#bbb;
  margin:20px auto;
  max-width:800px;
}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

.lightbox.active{
  display:flex;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="nav">
  <a href="index.html">Home</a>
</div>

<section>

<h2>Botez Băiat</h2>
<div class="img-grid">
  <img src="images/decor-baiat-1.jpeg" onclick="openImg(this.src)">
  <img src="images/decor-baiat-2.jpeg" onclick="openImg(this.src)">
</div>

<h2>Botez Fată</h2>
<div class="img-grid">
  <img src="images/decor-fata-1.jpeg" onclick="openImg(this.src)">
  <img src="images/decor-fata-2.jpeg" onclick="openImg(this.src)">
</div>

<h2>Majorat</h2>
<div class="img-grid">
  <img src="images/decor-majorat.jpeg" onclick="openImg(this.src)">
</div>

<h2>Gender Reveal</h2>
<div class="img-grid">
  <img src="images/gender.jpeg" onclick="openImg(this.src)">
</div>

</section>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="imgBox">
</div>

<script>
function openImg(src){
  document.getElementById("imgBox").src = src;
  document.getElementById("lightbox").classList.add("active");
}

function closeImg(){
  document.getElementById("lightbox").classList.remove("active");
}
</script>

</body>
</html>
