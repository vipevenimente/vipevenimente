<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie Video DJ Nuntă | VIP Events Solutions</title>

<meta name="description" content="Galerie video DJ pentru nunți și evenimente. Atmosferă, muzică și distracție la superlativ.">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
  text-align:center;
}

/* HEADER */
header {
  padding:30px;
  background:#000;
}

h1 {
  margin:0;
}

/* GRID */
.video-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD VIDEO */
.video-card {
  max-width:500px;
  margin:auto;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.video-card:hover {
  transform:scale(1.03);
}

.video-card img {
  width:100%;
  height:280px;
  object-fit:cover;
  border-radius:10px;
}

/* PLAY ICON */
.play {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:50px;
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:50%;
}

/* LIGHTBOX VIDEO */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox iframe {
  width:85vw;
  height:80vh;
  border-radius:10px;
}

/* BACK BUTTON */
.back {
  display:inline-block;
  margin:20px;
  padding:10px 15px;
  background:#007bff;
  color:#fff;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>

<body>

<header>
  <h1>Galerie Video DJ</h1>
  <a class="back" href="dj-nunta.html">⬅ Înapoi la DJ</a>
</header>

<div class="video-grid">

  <!-- VIDEO -->
  <div class="video-card" onclick="openVideo('tDcWGdIWiig')">
    <img src="https://img.youtube.com/vi/tDcWGdIWiig/hqdefault.jpg" alt="Video DJ eveniment">
    <div class="play">▶</div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeVideo()"></div>

<script>
function openVideo(id) {
  const box = document.getElementById("lightbox");
  box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay" allowfullscreen></iframe>`;
  box.style.display = "flex";
}

function closeVideo() {
  const box = document.getElementById("lightbox");
  box.style.display = "none";
  box.innerHTML = "";
}
</script>

</body>
</html>
