<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie VIP Events</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:#fff;
}

header {
  text-align:center;
  padding:40px;
}

.filters {
  text-align:center;
  margin-bottom:20px;
}

.filters button {
  padding:10px 15px;
  margin:5px;
  border:none;
  cursor:pointer;
  background:#222;
  color:#fff;
  border-radius:5px;
}

.filters button.active {
  background:#007bff;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  padding:10px;
}

.gallery img, .gallery video {
  width:100%;
  height:250px;
  object-fit:cover;
  cursor:pointer;
  border-radius:8px;
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img, .lightbox video {
  max-width:90%;
  max-height:90%;
}

.lightbox.active {
  display:flex;
}
</style>
</head>

<body>

<header>
  <h1>Galerie Evenimente</h1>
</header>

<!-- FILTRE -->
<div class="filters">
  <button onclick="filter('foto')">Foto</button>
  <button onclick="filter('video')">Video</button>
  <button onclick="filter('dj-foto')">DJ Foto</button>
  <button onclick="filter('dj-video')">DJ Video</button>
  <button onclick="filter('efecte-foto')">Efecte Foto</button>
  <button onclick="filter('efecte-video')">Efecte Video</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox"></div>

<script>

const data = {

  "foto": [
    "foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg",
    "foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg"
  ],

  "video": [
    "video1.mp4","video2.mp4","video3.mp4"
  ],

  "dj-foto": [
    "dj-foto1.jpg","dj-foto2.jpg","dj-foto3.jpg","dj-foto4.jpg","dj-foto5.jpg",
    "dj-foto6.jpg","dj-foto7.jpg","dj-foto8.jpg","dj-foto9.jpg","dj-foto10.jpg"
  ],

  "dj-video": [
    "dj-video1.mp4","dj-video2.mp4","dj-video3.mp4"
  ],

  "efecte-foto": [
    "efecte-foto1.jpg","efecte-foto2.jpg","efecte-foto3.jpg","efecte-foto4.jpg","efecte-foto5.jpg",
    "efecte-foto6.jpg","efecte-foto7.jpg","efecte-foto8.jpg","efecte-foto9.jpg","efecte-foto10.jpg"
  ],

  "efecte-video": [
    "efecte-video1.mp4","efecte-video2.mp4","efecte-video3.mp4"
  ]

};

const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");

function load(category) {

  gallery.innerHTML = "";

  data[category].forEach(file => {

    let el;

    if(file.includes(".mp4")) {
      el = document.createElement("video");
      el.src = "images/gallery/" + file;
      el.controls = true;
    } else {
      el = document.createElement("img");
      el.src = "images/gallery/" + file;
    }

    el.onclick = () => {
      lightbox.innerHTML = "";
      let clone = el.cloneNode(true);
      clone.controls = true;
      lightbox.appendChild(clone);
      lightbox.classList.add("active");
    };

    gallery.appendChild(el);
  });
}

function filter(category) {
  load(category);
}

lightbox.onclick = () => {
  lightbox.classList.remove("active");
};

load("foto");

</script>

</body>
</html>
