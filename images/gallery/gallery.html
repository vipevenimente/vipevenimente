<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie VIP Events Solutions</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
header {
  text-align:center;
  padding:40px;
}

/* BUTOANE */
.filters {
  text-align:center;
  margin-bottom:25px;
}

.filters button {
  padding:10px 18px;
  margin:5px;
  border:none;
  cursor:pointer;
  background:#1a1a1a;
  color:#ccc;
  border-radius:20px;
  transition:0.3s;
}

.filters button.active,
.filters button:hover {
  background:#007bff;
  color:#fff;
}

/* GALERIE */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  padding:15px;
  transition:0.4s;
}

.gallery.fade-out {
  opacity:0;
  transform:scale(0.98);
}

.gallery.fade-in {
  opacity:1;
  transform:scale(1);
}

/* CARD */
.card {
  position:relative;
  overflow:hidden;
  border-radius:12px;
}

.card img {
  width:100%;
  height:260px;
  object-fit:cover;
  transition:0.4s;
}

.card:hover img {
  transform:scale(1.1);
  filter:brightness(0.8);
}

/* PLAY BUTTON */
.play-btn {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:55px;
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:50%;
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* VIDEO MARE (FINAL) */
.lightbox iframe {
  width:85vw;
  height:90vh;
  max-width:1100px;
  aspect-ratio:16 / 9;
  border-radius:10px;
}

/* IMAGINI */
.lightbox img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

.lightbox.active {
  display:flex;
}
</style>
</head>

<body>

<header>
  <h1>Galerie Evenimente</h1>
</header>

<div class="filters">
  <button class="active" onclick="filterGallery('foto', this)">📸 Fotografie</button>
  <button onclick="filterGallery('video', this)">🎥 Videografie</button>
  <button onclick="filterGallery('dj-foto', this)">🎧 DJ Foto</button>
  <button onclick="filterGallery('dj-video', this)">🎧 DJ Video</button>
  <button onclick="filterGallery('efecte-foto', this)">✨ Efecte Foto</button>
</div>

<div class="gallery" id="gallery"></div>
<div class="lightbox" id="lightbox"></div>

<script>

const data = {

  "foto": [
    "foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg",
    "foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg"
  ],

  "video": [
    "foto1.jpg","foto2.jpg","foto3.jpg"
  ],

  "dj-foto": [
    "dj-foto1.jpg","dj-foto2.jpg","dj-foto3.jpg","dj-foto4.jpg","dj-foto5.jpg",
    "idj-foto6.jpg","dj-foto7.jpg"
  ],

  "efecte-foto": [
    "efecte-foto1.jpg","efecte-foto2.jpg","efecte-foto3.jpg","efecte-foto4.jpg","efecte-foto5.jpg",
    "efecte-foto6.jpg","efecte-foto7.jpg","efecte-foto8.jpg","efecte-foto9.jpg","efecte-foto10.jpg"
  ]

};

const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");

function loadGallery(category) {

  gallery.classList.add("fade-out");

  setTimeout(() => {

    gallery.innerHTML = "";

    // DJ VIDEO NETFLIX STYLE
    if(category === "dj-video") {

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = "https://img.youtube.com/vi/tDcWGdIWiig/hqdefault.jpg";

      const play = document.createElement("div");
      play.className = "play-btn";
      play.innerHTML = "▶";

      card.appendChild(img);
      card.appendChild(play);

      card.onclick = () => {
        lightbox.innerHTML = "";

        const iframe = document.createElement("iframe");
        iframe.src = "https://www.youtube.com/embed/tDcWGdIWiig?autoplay=1&start=57";
        iframe.allow = "autoplay";
        iframe.allowFullscreen = true;

        lightbox.appendChild(iframe);
        lightbox.classList.add("active");
      };

      gallery.appendChild(card);

    } else {

      data[category].forEach(file => {

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = "images/" + file;

        card.appendChild(img);

        card.onclick = () => {
          lightbox.innerHTML = "";
          let clone = img.cloneNode();
          lightbox.appendChild(clone);
          lightbox.classList.add("active");
        };

        gallery.appendChild(card);
      });

    }

    gallery.classList.remove("fade-out");
    gallery.classList.add("fade-in");

  }, 200);
}

function filterGallery(category, btn) {

  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  loadGallery(category);
}

lightbox.onclick = () => {
  lightbox.classList.remove("active");
};

loadGallery("foto");

</script>

</body>
</html>
