<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cabină Foto Nuntă | Photobooth Evenimente VIP Events</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin:0;
      background:#fff;
      color:#333;
    }

    header {
      background:#111;
      color:#fff;
      text-align:center;
      padding:50px 20px;
    }

    section {
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    h2 {
      text-align:center;
      margin-bottom:20px;
    }

    .pricing {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      border:1px solid #eee;
      border-radius:10px;
      overflow:hidden;
      background:#fff;
      transition:0.2s;
    }

    .card:hover {
      transform:scale(1.03);
    }

    .card img {
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
    }

    .card-content {
      padding:20px;
    }

    .price {
      font-size:22px;
      color:#007bff;
      font-weight:bold;
    }

    .gallery {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .gallery img {
      width:100%;
      height:300px;
      object-fit:cover;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    footer {
      background:#111;
      color:#fff;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  <h1>Cabină Foto Evenimente</h1>
  <p>Distracție instant • Amintiri pe loc • Photobooth profesional</p>
</header>

<!-- PACHETE -->
<section>

  <h2>Pachete Cabină Foto</h2>

  <div class="pricing">

    <div class="card">
      <img src="./images/cabina.png" alt="cabina foto">
      <div class="card-content">
        <h3>4 ore</h3>
        <p class="price">1300 lei</p>
      </div>
    </div>

    <div class="card">
      <img src="./images/cabina.png" alt="cabina foto">
      <div class="card-content">
        <h3>6 ore</h3>
        <p class="price">1600 lei</p>
      </div>
    </div>

    <div class="card">
      <img src="./images/cabina.png" alt="cabina foto">
      <div class="card-content">
        <h3>8 ore</h3>
        <p class="price">2000 lei</p>
      </div>
    </div>

  </div>

</section>

<!-- GALERIE -->
<section>

  <h2>Momente cabina foto</h2>

  <div class="gallery">

    <img src="./images/template1.png" alt="template 1">
    <img src="./images/template2.png" alt="template 2">
    <img src="./images/template3.png" alt="template 3">
    <img src="./images/template4.png" alt="template 4">

  </div>

</section>

<footer>
  © 2026 VIP Events Solutions SRL
</footer>

</body>
</html>
