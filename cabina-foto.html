<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cabina Foto</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .gallery img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #fff;
    }

    video {
      width: 300px;
      border-radius: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Cabina Foto 📸</h1>

  <video id="video" autoplay></video>
  <br/>
  <button onclick="capture()">Fă poză</button>

  <div class="gallery" id="gallery"></div>

  <script>
    const video = document.getElementById("video");
    const gallery = document.getElementById("gallery");

    // pornire cameră
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        console.error("Camera nu poate fi accesată:", err);
      });

    function capture() {
      const canvas = document.createElement("canvas");
      canvas.width = 300;
      canvas.height = 300;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const img = document.createElement("img");
      img.src = canvas.toDataURL("image/png");

      gallery.appendChild(img);
    }
  </script>

</body>
</html>
