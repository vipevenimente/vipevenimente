<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cabină Foto Nuntă | Photobooth VIP Events Solutions</title>

  <meta name="description" content="Cabină foto pentru nunți și evenimente. Pachete 4h, 6h, 8h cu fotografii nelimitate și distracție garantată.">

  <meta name="robots" content="index, follow">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin:0;
      background:#fff;
      color:#333;
    }

    header {
      background:#111;
      color:#fff;
      text-align:center;
      padding:50px 20px;
    }

    section {
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    h2 {
      text-align:center;
      margin-bottom:20px;
    }

    .pricing {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      border:1px solid #eee;
      border-radius:10px;
      overflow:hidden;
      background:#fff;
      transition:0.3s;
    }

    .card:hover {
      transform:scale(1.03);
    }

    .card img {
      width:100%;
      height:240px;
      object-fit:cover;
    }

    .card-content {
      padding:20px;
    }

    .price {
      font-size:22px;
      color:#007bff;
      font-weight:bold;
    }

    /* GALERIE */
    .gallery {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
      margin-top:20px;
    }

    .gallery img {
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:10px;
      transition:0.3s;
    }

    .gallery img:hover {
      transform:scale(1.05);
    }

    footer {
      background:#111;
      color:#fff;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  <h1>Cabină Foto Evenimente</h1>
  <p>Distracție instant • Amintiri pe loc • Photobooth profesional</p>
</header>

<section>

  <h2>Pachete Cabină Foto</h2>

  <div class="pricing">

    <div class="card">
      <img src="images/cabina-main.jpg">
      <div class="card-content">
        <h3>4 ore</h3>
        <p class="price">1300 lei</p>
      </div>
    </div>

    <div class="card">
      <img src="images/cabina-main.jpg">
      <div class="card-content">
        <h3>6 ore</h3>
        <p class="price">1600 lei</p>
      </div>
    </div>

    <div class="card">
      <img src="images/cabina-main.jpg">
      <div class="card-content">
        <h3>8 ore</h3>
        <p class="price">2000 lei</p>
      </div>
    </div>

  </div>

</section>

<!-- GALERIE ADAUGATA -->
<section>

  <h2>Galerie Cabina Foto</h2>

  <div class="gallery">

    <img src="images/preview1.png" alt="cabina foto preview">
    <img src="images/preview7.png" alt="cabina foto preview">
    <img src="images/preview23.png" alt="cabina foto preview">

    <!-- CU SPATII (merge, dar nu e ideal) -->
    <img src="images/botez 1.png" alt="cabina foto botez">
    <img src="images/botez 2.png" alt="cabina foto botez">
   

  </div>

</section>

<footer>
  © 2026 VIP Events Solutions SRL
</footer>

</body>
</html>
